name: Daily Founder Intel Digest

on:
  schedule:
    # 06:00 PST (UTC-8) = 14:00 UTC. During PDT (UTC-7) this fires at 07:00 local.
    - cron: "0 14 * * *"
  workflow_dispatch: {}

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: python -m src.main
        env:
          BRIGHTDATA_API_KEY: ${{ secrets.BRIGHTDATA_API_KEY }}
          BRIGHTDATA_LINKEDIN_DATASET_ID: ${{ secrets.BRIGHTDATA_LINKEDIN_DATASET_ID }}
          BRIGHTDATA_X_DATASET_ID: ${{ secrets.BRIGHTDATA_X_DATASET_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
